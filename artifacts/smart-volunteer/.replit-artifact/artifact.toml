kind = "web"
previewPath = "/"
title = "Smart Volunteer Allocation System"
version = "1.0.0"
id = "artifacts/smart-volunteer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23391

[services.development]
run = "pnpm --filter @workspace/smart-volunteer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-volunteer", "run", "build" ]
publicDir = "artifacts/smart-volunteer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23391"
BASE_PATH = "/"
